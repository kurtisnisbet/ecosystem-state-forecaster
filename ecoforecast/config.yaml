# Single source of truth for AOIs, dates, variables, and paths.
# Values marked TODO are deferred until after EDA (see brief section 10.8).

project:
  name: ecosystem-state-forecaster
  target: ndvi          # also compute 'ndvi_anomaly' for comparison
  horizon: 1            # steps ahead
  cadence: monthly

imagery:                        # DEA analysis-ready surface reflectance profiles
  sentinel2:                    # v1: 10 m native, ~2015-present
    products: [ga_s2am_ard_3, ga_s2bm_ard_3]
    nir_band: nbart_nir_1
    time_range: "2015-10-01/2026-06-30"
  landsat:                      # v2: 30 m native, ~1988-present (longer record, coarser)
    products: [ga_ls5t_ard_3, ga_ls7e_ard_3, ga_ls8c_ard_3, ga_ls9c_ard_3]
    nir_band: nbart_nir
    time_range: "1988-01-01/2026-06-30"

build:                          # settings for scripts/build_cube.py
  profile: sentinel2            # sentinel2 (v1) | landsat (v2, longer record)
  resolution_m: 100             # 10 (S2) / 30 (Landsat) native; 100 = scaled-back local
  biomes: [sunshine_coast_hinterland, daintree, alice_springs, kosciuszko]
  cache_dir: data               # cubes at {cache_dir}/cube_{profile}_{resolution_m}m_{biome}.nc
  max_train_rows: null          # cap GBT training rows; 3000000 at 10 m to stay tractable
  run_name: null                # set for side experiments so their results get
                                # their own filenames and skip the demo artifacts
                                # (the resolution experiment used: profile sentinel2,
                                #  biomes [sunshine_coast_core], run_name resolution,
                                #  block_size_m 500, buffer_m 100, and 100 m then 10 m)

drivers_build:                  # settings for scripts/build_drivers.py
  use: false                     # ablation: lagged rainfall did not help one-step NDVI; off by default
  silo_variables: [monthly_rain]   # add max_temp, min_temp (daily, heavier) later
  cache_dir: data               # drivers at {cache_dir}/drivers_{biome}.nc (gitignored)

biomes:
  sunshine_coast_hinterland:   # subtropical
    bbox: [152.80, -26.80, 152.90, -26.68]   # provisional; refine after EDA/variogram
    crs: EPSG:4326
  daintree:                    # tropical rainforest (Far North QLD)
    bbox: [145.30, -16.20, 145.42, -16.08]
    crs: EPSG:4326
  alice_springs:               # arid (Central Australia)
    bbox: [133.80, -23.80, 133.92, -23.68]
    crs: EPSG:4326
  kosciuszko:                  # alpine (Snowy Mountains)
    bbox: [148.22, -36.50, 148.34, -36.38]
    crs: EPSG:4326
  sunshine_coast_core:         # 4 x 4 km, nested inside sunshine_coast_hinterland.
    bbox: [152.830, -26.758, 152.870, -26.722]   # for the 10 m vs 100 m comparison
    crs: EPSG:4326

drivers:
  rainfall: silo
  temperature: silo
  soil_moisture: era5_land
  fire: modis_burned_area

splits:
  temporal:
    method: walk_forward
    block_months: 3
    n_test_folds: 4       # provisional; confirm after EDA
    embargo_months: 3     # ~ feature lookback
  spatial:
    n_test_blocks: 3
    # Ground distances, so the same split holds at any resolution. At 100 m these
    # resolve to the 20 px blocks and 2 px buffer used for every published result.
    # For the 4 km resolution experiment use 500 / 100 instead, since a 4 km box
    # cannot hold enough 2 km blocks (see README, Resolution).
    block_size_m: 2000
    buffer_m: 200
    block_size_px: 20     # fallback when a cube has no projected coordinates
    buffer_px: 2

paths:
  data: data/             # gitignored
  artifacts: artifacts/   # gitignored
