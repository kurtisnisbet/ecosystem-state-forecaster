# Single source of truth for AOIs, dates, variables, and paths.
# Values marked TODO are deferred until after EDA (see brief section 10.8).

project:
  name: ecosystem-state-forecaster
  target: ndvi          # also compute 'ndvi_anomaly' for comparison
  horizon: 1            # steps ahead
  cadence: monthly

imagery:
  source: dea                 # Digital Earth Australia
  products: [ga_s2am_ard_3, ga_s2bm_ard_3]   # Sentinel-2A/2B, Collection 3
  resolution_m: 10
  bands: [nbart_red, nbart_nir_1]            # for NDVI; extend as needed
  cloud_mask: [oa_fmask, s2cloudless]

build:                          # settings for scripts/build_cube.py
  biome: sunshine_coast_hinterland
  time_range: "2015-10-01/2026-06-30"
  resolution_m: 100             # scaled-back local run; 10 = native (Azure/GPU target)
  cache: data/cube_sunshine_coast.nc   # gitignored

drivers_build:                  # settings for scripts/build_drivers.py
  use: false                     # ablation: lagged rainfall did not help one-step NDVI; off by default
  silo_variables: [monthly_rain]   # add max_temp, min_temp (daily, heavier) later
  cache: data/drivers_sunshine_coast.nc   # gitignored

biomes:
  sunshine_coast_hinterland:   # build first
    bbox: [152.80, -26.80, 152.90, -26.68]   # provisional; refine after EDA/variogram
    crs: EPSG:4326
  daintree:        { bbox: null }   # TODO
  alice_springs:   { bbox: null }   # TODO
  kosciuszko:      { bbox: null }   # TODO

drivers:
  rainfall: silo
  temperature: silo
  soil_moisture: era5_land
  fire: modis_burned_area

splits:
  temporal:
    method: walk_forward
    block_months: 3
    n_test_folds: 4       # provisional; confirm after EDA
    embargo_months: 3     # ~ feature lookback
  spatial:
    n_test_blocks: 3
    block_size_m: null    # TODO: derive from variogram range
    buffer_m: null        # TODO: derive from variogram range
    block_size_px: 20     # provisional pixel block until the variogram is computed
    buffer_px: 2

paths:
  data: data/             # gitignored
  artifacts: artifacts/   # gitignored
