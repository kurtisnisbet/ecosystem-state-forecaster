name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # Light test dependencies only. PyTorch is heavy and its tests skip via
        # pytest.importorskip, so CI runs everything except the deep-learning
        # model training, which is exercised locally on a GPU. netcdf4 is needed
        # because the demo-artifact tests round-trip through a NetCDF file.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas xarray netcdf4 lightgbm scikit-learn pytest
          pip install -e .

      - name: Run tests
        run: pytest -q
